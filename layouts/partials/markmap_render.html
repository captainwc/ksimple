<script>
    (function() {
        // 1. 全局配置和状态
        const D3_URL = 'https://cdn.jsdelivr.net/npm/d3@7.8.5';
        const MARKMAP_VIEW_URL = 'https://cdn.jsdelivr.net/npm/markmap-view@0.17.0';
        const MARKMAP_LIB_URL = 'https://cdn.jsdelivr.net/npm/markmap-lib@0.17.0';

        /**
         * 辅助函数：加载脚本，带缓存检查和状态追踪
         */
        function loadScript(url) {
            let script = document.querySelector(`script[src="${url}"]`);
            if (script) {
                if (script.dataset.loaded === 'true') return Promise.resolve();
                if (script.dataset.failed === 'true') return Promise.reject(new Error(`Script failed to load: ${url}`));
                return new Promise((resolve, reject) => {
                    script.addEventListener('load', resolve);
                    script.addEventListener('error', reject);
                });
            }
            return new Promise((resolve, reject) => {
                script = document.createElement('script');
                script.src = url;
                script.dataset.loaded = 'false';
                script.onload = () => {
                    script.dataset.loaded = 'true';
                    resolve();
                };
                script.onerror = (err) => {
                    script.dataset.failed = 'true';
                    reject(err);
                };
                document.head.appendChild(script);
            });
        }

        /**
         * 顺序加载库文件，确保依赖关系和全局命名空间安全
         */
        async function loadLibraries() {
            try {
                // 首先加载 d3，它是 markmap-view 的依赖
                await loadScript(D3_URL);
                // 接着加载 markmap-view
                await loadScript(MARKMAP_VIEW_URL);
                // 最后加载 markmap-lib
                await loadScript(MARKMAP_LIB_URL);

                // 验证核心对象
                if (!window.markmap || !window.markmap.Markmap || !window.markmap.Transformer) {
                    throw new Error('Markmap components missing after loading scripts');
                }
                return true;
            } catch (err) {
                console.error('Markmap libraries failed to load:', err);
                return false;
            }
        }

        /**
         * 渲染单个代码块
         */
        function renderBlock(codeBlock, index) {
            if (!window.diagramRenderUtils) {
                console.error('diagramRenderUtils not found');
                return;
            }

            const container = window.diagramRenderUtils.createDiagramContainer();
            const markmapContainer = document.createElement('div');
            markmapContainer.className = 'markmap';
            markmapContainer.id = `markmap-${index}`;
            markmapContainer.style.minHeight = '300px';
            markmapContainer.style.width = '100%';
            markmapContainer.style.position = 'relative';

            const code = codeBlock.textContent.trim();
            const svgElement = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svgElement.style.width = '100%';
            svgElement.style.height = '400px';
            markmapContainer.appendChild(svgElement);

            const copyButton = window.diagramRenderUtils.createCopyButton();
            window.diagramRenderUtils.setupCopyButton(copyButton, code);

            window.diagramRenderUtils.setupShowSourceCode(markmapContainer, code);

            const fullscreenButton = window.diagramRenderUtils.createFullscreenButton();
            window.diagramRenderUtils.setupFullscreenButton(fullscreenButton, markmapContainer, false);

            container.appendChild(markmapContainer);
            container.appendChild(fullscreenButton);
            container.appendChild(copyButton);

            const pre = codeBlock.closest('pre');
            if (pre) {
                pre.insertAdjacentElement('afterend', container);
                pre.remove();
            }

            renderMarkmapWithRetry(svgElement, markmapContainer, code);
        }

        /**
         * 带有重试机制的渲染函数
         */
        function renderMarkmapWithRetry(svgElement, markmapContainer, code, maxRetries = 5, delay = 200) {
            let attempt = 0;

            function tryRender() {
                attempt++;
                try {
                    const markmap = window.markmap;
                    if (!markmap || typeof markmap.Markmap !== 'function' || typeof markmap.Transformer !== 'function') {
                        throw new Error('Markmap not ready');
                    }

                    const transformer = new markmap.Transformer();
                    const { root, features } = transformer.transform(code);
                    const mm = new markmap.Markmap(svgElement, {
                        autoFit: true,
                        duration: 500,
                        zoom: true,
                    });

                    mm.setData(root, features);
                    // 稍微延迟 fit 以确保 SVG 已渲染
                    setTimeout(() => mm.fit(), 50);

                    // 存储数据供全屏模式使用
                    markmapContainer.dataset.markmapData = JSON.stringify({ root, features });

                    // 处理链接
                    setTimeout(() => {
                        svgElement.querySelectorAll('a').forEach(link => {
                            link.setAttribute('target', '_blank');
                            link.setAttribute('rel', 'noopener noreferrer');
                        });
                    }, 200);

                } catch (error) {
                    if (attempt < maxRetries) {
                        setTimeout(tryRender, delay);
                    } else {
                        console.error('Markmap render failed after retries:', error);
                        markmapContainer.innerHTML = `<div style="color:red;border:1px solid #ffcccc;padding:10px;font-size:12px;">
                            Markmap 渲染失败 (尝试 ${attempt} 次): ${error.message}<br>请刷新页面重试。
                        </div>`;
                    }
                }
            }
            tryRender();
        }

        /**
         * 初始化全屏功能扩展
         */
        function extendFullscreen() {
            if (!window.diagramRenderUtils || window.diagramRenderUtils._markmapExtended) return;

            const originalSetupFullscreen = window.diagramRenderUtils.setupFullscreenButton;
            window.diagramRenderUtils.setupFullscreenButton = function(btn, content, isImg) {
                if (content.classList.contains('markmap')) {
                    btn.addEventListener('click', () => {
                        const overlay = this.getOrCreateFullscreenOverlay();
                        overlay.innerHTML = '';

                        const exitBtn = document.createElement('button');
                        exitBtn.className = 'fullscreen-exit-button';
                        exitBtn.innerHTML = 'ESC';
                        exitBtn.onclick = () => overlay.classList.remove('active');
                        overlay.appendChild(exitBtn);

                        const fsContainer = document.createElement('div');
                        fsContainer.style.width = '100%';
                        fsContainer.style.height = '100%';
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.style.width = '100%';
                        svg.style.height = '100%';
                        fsContainer.appendChild(svg);
                        overlay.appendChild(fsContainer);
                        overlay.classList.add('active');

                        try {
                            const data = JSON.parse(content.dataset.markmapData || '{}');
                            if (data.root) {
                                const mm = new window.markmap.Markmap(svg, { autoFit: true, duration: 500, zoom: true });
                                mm.setData(data.root, data.features);
                                setTimeout(() => mm.fit(), 100);
                                
                                setTimeout(() => {
                                    svg.querySelectorAll('a').forEach(l => {
                                        l.setAttribute('target', '_blank');
                                        l.setAttribute('rel', 'noopener noreferrer');
                                    });
                                }, 200);
                            }
                        } catch (e) {
                            console.error('Fullscreen render error:', e);
                        }
                        this.setupZoomAndDrag(overlay, 'svg');
                    });
                } else {
                    originalSetupFullscreen.call(this, btn, content, isImg);
                }
            };
            window.diagramRenderUtils._markmapExtended = true;
        }

        // 主入口
        document.addEventListener('DOMContentLoaded', async function() {
            const blocks = document.querySelectorAll('pre code.language-map, pre code.language-mindmap');
            if (!blocks.length) return;

            // 扩展全屏功能
            extendFullscreen();

            // 加载库并渲染
            const success = await loadLibraries();
            if (success) {
                blocks.forEach((block, i) => renderBlock(block, i));
            } else {
                blocks.forEach(block => {
                    const errorDiv = document.createElement('div');
                    errorDiv.style.color = 'red';
                    errorDiv.textContent = '无法加载 Markmap 库，请检查网络连接。';
                    block.closest('pre').insertAdjacentElement('afterend', errorDiv);
                });
            }
        });
    })();
</script>
